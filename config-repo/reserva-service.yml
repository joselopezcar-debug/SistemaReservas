server:
  port: 8082

spring:
  application:
    name: reserva-service

  datasource:
    url: jdbc:mysql://localhost:3306/reservas_db
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

info:
  app:
    name: Reserva Service
    version: 1.0