server:
  port: 8081

spring:
  application:
    name: cliente-service

  datasource:
    url: jdbc:mysql://localhost:3306/clientes_db
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  messages:
    error-service: "No fue posible consultar el servicio. Intente nuevamente."

info:
  app:
    name: Cliente Service
    version: 1.0